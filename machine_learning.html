 	/*
	 * Inputs: duration --- the interval at which to call the function
	 * 		   fn       --- the function to call
	 *
	 * Replaces setTimeout() with a more accurate version.
	 */
	function interval(duration, fn) {

		this.baseline = undefined;
		this.duration = duration;

		this.run = function() {
		    if (this.baseline === undefined) {
		    	this.baseline = new Date().getTime();
		    }
		    fn();
		    var end = new Date().getTime();
		    this.baseline += this.duration;
		    var nextTick = this.duration - (end - this.baseline);
		    if (nextTick < 0) {
		      nextTick = 0;
		    }
		    (function(i) {
		        i.timer = setTimeout(function() {
		        	i.run(end);
		      	}, nextTick)
		    }) (this)
	  	}

		this.end = function() {
	   		clearTimeout(this.timer);
	   		this.baseline = undefined;
	 	}
	}

	var t = 1;

	/*
	 * Draw notes on the canvas.
	 */
	function draw_notes(notes) {

		for (var measure = -1; measure < 4; measure++) {
			var renderer = new Vex.Flow.Renderer(canvas, Vex.Flow.Renderer.Backends.CANVAS);
			var ctx = renderer.getContext();
			var stave = new Vex.Flow.Stave(measure*220+55, 0, 220);
	        if (measure === -1) {
	        	stave = new Vex.Flow.Stave(0, 0, 55);
				stave.addClef("treble").setContext(ctx).draw();
				continue;
			} else {
				stave.setContext(ctx).draw();
			}
			var staff_notes = [];
			for (var i = 0; i < notes[measure].length; i++) {
				var note = notes[measure][i];
				// Convert note.
				if (note.length === 2) {
					var new_note = new Vex.Flow.StaveNote({ keys: [note.toLowerCase().substring(0, 1) + "/" + note.substring(1, 2)], duration: "q" });
				}
				else {
					var new_note = new Vex.Flow.StaveNote({ keys: [note.toLowerCase().substring(0, 2) + "/" + note.substring(2, 3)], duration: "q" });
				}
				// Play note.
				if (note.length === 2) {
					staff_notes.push(new_note);
				}
				else {
					if (note.substring(1, 2) === "#") {
						staff_notes.push(new_note.addAccidental(0, new Vex.Flow.Accidental("#")));
					}
					else {
						staff_notes.push(new_note.addAccidental(0, new Vex.Flow.Accidental("b")));
					}
				}
			}
			// Create a voice in 4/4.
			var voice = new Vex.Flow.Voice({
				num_beats: 4,
				beat_value: 4,
				resolution: Vex.Flow.RESOLUTION
			});
			// Add notes to voice
			voice.addTickables(staff_notes);
			var formatter = new Vex.Flow.Formatter().joinVoices([voice]).format([voice], 220);
			// Render voice
			voice.draw(ctx, stave);	
		}
	}

	 /*
	  * Draw chords on the canvas.
	  */
	function draw_chords(chords) {

		for (var measure = -1; measure < 4; measure++) {
			var renderer = new Vex.Flow.Renderer(canvas2, Vex.Flow.Renderer.Backends.CANVAS);
			var ctx = renderer.getContext();
			var stave = new Vex.Flow.Stave(measure*220+55, 0, 220);
		    if (measure === -1) {
		    	stave = new Vex.Flow.Stave(0, 0, 55);
				stave.addClef("bass").setContext(ctx).draw();
				continue;
			} else {
				stave.setContext(ctx).draw();
			}
			var staff_notes = [];
			for (var i = 0; i < chords[measure].length; i++) {
				var chord = chords[measure][i];
				// Convert chord.
				var chord_notes = new Array();
				for (j = 0; j < chord.length; j++) {
					chord_notes.push(chord[j].toLowerCase().substring(0, 1) + "/" + chord[j].substring(1, 2));
				}
				var new_chord = new Vex.Flow.StaveNote({ keys: chord_notes, duration: "q" });
				staff_notes.push(new_chord);
			}
			// Create a voice in 4/4.
			var voice = new Vex.Flow.Voice({
				num_beats: 4,
				beat_value: 4,
				resolution: Vex.Flow.RESOLUTION
			});
			// Add notes to voice
			voice.addTickables(staff_notes);
			var formatter = new Vex.Flow.Formatter().joinVoices([voice]).format([voice], 220);
			// Render voice
			voice.draw(ctx, stave);	
		}
	}


	/*
	 * Start our machine learning.
	 */
 	function start() {
 		timer.run();
 		external_timer.run();
 	}

 	/*
 	 * Stop the machine learning.
 	 */
 	function stop() {
 		timer.end();
 	}

 	/*

	/*
	 * Compare two arrays.
	 */
	 function compare_arrays(array1, array2) {
	 	if (array1.length != array2.length) {
	 		return false;
	 	}
	 	for (var i = 0; i < array1.length; i++) {
	 		if (array1[i] != array2[i]) {
	 			return false;
	 		}
	 	}
	 	return true;
	 }
